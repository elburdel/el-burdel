<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Burdel</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    .tablon-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(3px);
      animation: tablon-fade-in 0.25s ease;
    }
    .tablon-modal-overlay.hidden {
      display: none;
    }
    .tablon-modal {
      background: var(--negro-2);
      border: 1px solid rgba(200,150,0,0.25);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      animation: tablon-slide-up 0.3s ease;
    }
    .tablon-modal-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tablon-modal-icon {
      font-size: 22px;
    }
    .tablon-modal-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--crema-3);
    }
    .tablon-modal-msg {
      font-size: 17px;
      color: var(--crema);
      line-height: 1.6;
      margin-bottom: 24px;
      font-style: italic;
    }
    .tablon-modal-btn {
      background: var(--rojo);
      border: none;
      color: var(--crema);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 11px 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .tablon-modal-btn:hover {
      opacity: 0.85;
    }
    @keyframes tablon-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes tablon-slide-up {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- NAV TOP -->
  <nav class="nav-top">
    <div class="nav-top-inner">
      <a href="index.html" class="nav-brand">El Burdel</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Inicio</a>
      </div>
      <div class="nav-right">
        <div class="nav-user-pill" id="nav-user"></div>
        <button class="nav-logout" onclick="handleLogout()">Salir</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="dashboard-main">


    <!-- JUEGOS DISPONIBLES -->
    <div class="dash-lobby" id="dash-lobby">
      <div class="dash-lobby-inner">
        <span class="section-label">Esta noche</span>
        <h2 class="dash-lobby-title">Juegos</h2>
        <div class="dash-games-grid" id="dash-games-grid">
          <a class="dash-game-card" id="game-card-taboo" href="taboo.html" style="text-decoration:none;">
            <span class="dash-game-icon">🃏</span>
            <div class="dash-game-name">Taboo</div>
            <div class="dash-game-status" id="status-taboo">Jugar</div>
          </a>
          <a class="dash-game-card" id="game-card-wordle" href="wordle.html" style="text-decoration:none;">
            <span class="dash-game-icon">🔤</span>
            <div class="dash-game-name">Wordle</div>
            <div class="dash-game-status" id="status-wordle">Jugar</div>
          </a>
          <div class="dash-game-card" id="game-card-impostor">
            <span class="dash-game-icon">🕵️</span>
            <div class="dash-game-name">El Impostor</div>
            <div class="dash-game-status" id="status-impostor">Próximamente</div>
          </div>
          <div class="dash-game-card" id="game-card-millonario">
            <span class="dash-game-icon">💰</span>
            <div class="dash-game-name">El Millonario</div>
            <div class="dash-game-status" id="status-millonario">Próximamente</div>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div class="dash-content" id="dash-content">

      <!-- ESTADO IDLE (sin juego activo) -->
      <div class="dash-idle" id="dash-idle">
        <div class="dash-idle-bombitas">
          <span class="bombita"></span><span class="bombita"></span><span class="bombita"></span>
          <span class="bombita"></span><span class="bombita"></span>
        </div>
        <h2 class="dash-idle-title">Esperando al admin...</h2>
        <p class="dash-idle-sub">El juego todavía no empezó. Quedate acá y vas a ver todo en tiempo real.</p>
      </div>

    </div>

  </main>

  <!-- MODAL TABLÓN -->
  <div class="tablon-modal-overlay hidden" id="tablon-modal-overlay">
    <div class="tablon-modal">
      <div class="tablon-modal-header">
        <span class="tablon-modal-icon">📢</span>
        <span class="tablon-modal-label">Mensaje del admin</span>
      </div>
      <p class="tablon-modal-msg" id="tablon-modal-msg"></p>
      <button class="tablon-modal-btn" onclick="dismissTablon()">Entendido</button>
    </div>
  </div>

  <!-- NAV BOTTOM -->
  <footer class="nav-bottom">
    <div class="nav-bottom-inner">
      <div class="nav-bottom-links">
        <a href="index.html" class="nav-bottom-link">Inicio</a>
        <a href="terminos.html" class="nav-bottom-link">Términos</a>
        <a href="privacidad.html" class="nav-bottom-link">Privacidad</a>
      </div>
      <button class="nav-bottom-link" style="background:none;border:none;cursor:pointer;" onclick="handleLogout()">Cerrar sesión</button>
      <p class="nav-bottom-copy">© 2025 El Burdel</p>
    </div>
  </footer>

  <script type="module">
    import { onSession, getUserData, logoutUser } from "./js/auth.js";
    import { db } from "./js/firebase-init.js";
    import { ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    let currentUser = null;
    let currentUserData = null;

    // ── AUTH ──
    onSession(async (user) => {
      if (!user) { window.location.href = "/el-burdel/login.html"; return; }
      const data = await getUserData(user.uid);
      if (!data) { window.location.href = "/el-burdel/login.html"; return; }
      if (data.status === "pending") { window.location.href = "/el-burdel/pending.html"; return; }
      if (data.status === "paused")  { window.location.href = "/el-burdel/paused.html"; return; }
      if (data.role === "admin")     { window.location.href = "/el-burdel/admin.html"; return; }

      currentUser = user;
      currentUserData = data;

      document.getElementById("nav-user").innerHTML = `
        <span class="nav-user-dot"></span>
        <span class="nav-user-nick">${data.nick} ${data.team === "rojo" ? "🔴" : data.team === "azul" ? "🔵" : ""}</span>
      `;

      initDashboard();
    });

    window.handleLogout = () => logoutUser();

    function initDashboard() {
      listenTablon();
      listenActiveGame();
      initPresence();
    }

    // ── Juego activo ──
    function listenActiveGame() {
      onValue(ref(db, "session/activeGame"), (snap) => {
        const game = snap.val() || "none";
        const games = ["taboo", "wordle", "impostor", "millonario"];
        games.forEach(g => {
          const el = document.getElementById(`status-${g}`);
          const card = document.getElementById(`game-card-${g}`);
          if (!el) return;
          if (g === game) {
            el.textContent = "🟢 Activo ahora";
            el.className = "dash-game-status active";
            if (card) card.classList.add("active");
          } else if (g === "taboo" || g === "wordle") {
            el.textContent = "Jugar";
            el.className = "dash-game-status";
            if (card) card.classList.remove("active");
          } else {
            el.textContent = "Próximamente";
            el.className = "dash-game-status";
            if (card) card.classList.remove("active");
          }
        });
      });
    }

    // ── Tablón emergente ──
    function listenTablon() {
      onValue(ref(db, "session/broadcast"), snap => {
        const msg = snap.val() || "";
        if (!msg) return;
        const storageKey = `tablon_seen_${currentUser.uid}`;
        const lastSeen = localStorage.getItem(storageKey);
        if (lastSeen === msg) return;
        document.getElementById("tablon-modal-msg").textContent = msg;
        document.getElementById("tablon-modal-overlay").classList.remove("hidden");
      });
    }

    window.dismissTablon = () => {
      const msg = document.getElementById("tablon-modal-msg").textContent;
      const storageKey = `tablon_seen_${currentUser.uid}`;
      localStorage.setItem(storageKey, msg);
      document.getElementById("tablon-modal-overlay").classList.add("hidden");
    };

    // ── Presence ──
    function initPresence() {
      const connectedRef = ref(db, ".info/connected");
      const presenceRef  = ref(db, `presence/${currentUser.uid}`);
      onValue(connectedRef, (snap) => {
        if (snap.val() !== true) return;
        set(presenceRef, {
          nick: currentUserData.nick,
          team: currentUserData.team || null,
          connectedAt: Date.now()
        });
        onDisconnect(presenceRef).remove();
      });
    }
  </script>
</body>
</html>
