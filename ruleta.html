<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta — El Burdel</title>
  <meta name="description" content="Ruleta en tiempo real de El Burdel" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="El Burdel" />
  <meta property="og:title" content="Ruleta — El Burdel" />
  <meta property="og:url" content="https://elburdel.com.ar/ruleta.html" />
  <meta property="og:image" content="https://elburdel.com.ar/assets/img/og-cover.jpg" />
  <link rel="icon" type="image/png" href="assets/img/logo.png" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/ruleta.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>
<body>

<main class="rul-main">
  <div class="rul-header">
    <span class="rul-title">🎡 RULETA</span>
    <span class="rul-modo-badge" id="modo-badge">—</span>
  </div>

  <div class="rul-waiting" id="estado-waiting">
    <div class="rul-waiting-icon">🎡</div>
    <div class="rul-waiting-title">ESPERANDO AL ADMIN</div>
    <div class="rul-waiting-sub">La ruleta se configurará en breve...</div>
  </div>

  <div class="rul-stage hidden" id="rul-stage">

    <!-- Ruleta 1 -->
    <div class="rul-block" id="block-1">
      <div class="rul-nombre" id="nombre-1">Ruleta 1</div>
      <div class="rul-canvas-wrap">
        <div class="rul-pointer"></div>
        <canvas class="rul-canvas" id="canvas-1" width="500" height="500"></canvas>
      </div>
      <div class="rul-resultado">
        <div class="rul-resultado-label">RESULTADO</div>
        <div class="rul-resultado-nombre" id="resultado-nombre-1"></div>
      </div>
      <div class="rul-restantes hidden" id="restantes-1">Quedan <span id="restantes-num-1">0</span></div>
      <div class="rul-historial-section hidden" id="historial-section-1">
        <div class="rul-historial-title">YA SALIERON</div>
        <div class="rul-historial-list" id="historial-list-1"></div>
      </div>
      <div class="rul-terminada" id="terminada-1">
        <div class="rul-terminada-icon">🏁</div>
        <div class="rul-terminada-title">RULETA TERMINADA</div>
        <div class="rul-terminada-sub">No quedan participantes.</div>
      </div>
    </div>

    <!-- Ruleta 2 (solo modo 2) -->
    <div class="rul-block hidden" id="block-2">
      <div class="rul-nombre" id="nombre-2">Ruleta 2</div>
      <div class="rul-canvas-wrap">
        <div class="rul-pointer"></div>
        <canvas class="rul-canvas" id="canvas-2" width="500" height="500"></canvas>
      </div>
      <div class="rul-resultado">
        <div class="rul-resultado-label">RESULTADO</div>
        <div class="rul-resultado-nombre" id="resultado-nombre-2"></div>
      </div>
      <div class="rul-restantes hidden" id="restantes-2">Quedan <span id="restantes-num-2">0</span></div>
      <div class="rul-historial-section hidden" id="historial-section-2">
        <div class="rul-historial-title">YA SALIERON</div>
        <div class="rul-historial-list" id="historial-list-2"></div>
      </div>
      <div class="rul-terminada" id="terminada-2">
        <div class="rul-terminada-icon">🏁</div>
        <div class="rul-terminada-title">RULETA TERMINADA</div>
        <div class="rul-terminada-sub">No quedan participantes.</div>
      </div>
    </div>

  </div>

  <!-- Parejas (modo 2) -->
  <div class="rul-parejas-section hidden" id="parejas-section">
    <div class="rul-parejas-title">PAREJAS FORMADAS</div>
    <div class="rul-parejas-list" id="parejas-list"></div>
  </div>

</main>

<script type="module">
import { initNavbar } from "./js/navbar.js";
import { onRuletaConfig, onRuletaData, onParejas } from "./games/ruleta.js";

initNavbar();

const PALETA = [
  "#c89600","#8b1a1a","#3a6b3a","#1a3a6b","#6b1a5a",
  "#6b4f1a","#1a5a6b","#5a6b1a","#6b1a1a","#1a6b5a",
  "#c84040","#40c880","#4080c8","#c840c8","#c8a040",
  "#40c8c8","#8040c8","#c88040","#40c840","#c84080"
];

// ── Estado local ──
let modo = "1";
let ruletaState = { 1: {}, 2: {} };
let giroIds = { 1: null, 2: null };
let spinning = { 1: false, 2: false };
// currentAngles: el ángulo donde quedó dibujada la ruleta actualmente
// SIEMPRE parte desde 0 al inicio de cada giro
let currentAngles = { 1: 0, 2: 0 };
let animFrames = { 1: null, 2: null };

// ── Audio ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTick() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    osc.start(); osc.stop(ctx.currentTime + 0.04);
  } catch(e) {}
}
function playGanador() {
  try {
    const ctx = getAudio();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
    });
  } catch(e) {}
}

// ── Dibujar ruleta ──
function dibujarRuleta(num, participantes, angulo) {
  const canvas = document.getElementById(`canvas-${num}`);
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2, r = W / 2 - 4;
  const n = participantes.length;
  ctx.clearRect(0, 0, W, H);

  if (n === 0) {
    ctx.fillStyle = "rgba(200,150,0,0.08)";
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(200,150,0,0.2)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    return;
  }

  const slice = (Math.PI * 2) / n;
  for (let i = 0; i < n; i++) {
    const sA = angulo + i * slice;
    const eA = sA + slice;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, sA, eA); ctx.closePath();
    ctx.fillStyle = PALETA[i % PALETA.length]; ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(sA + slice / 2);
    ctx.textAlign = "right"; ctx.fillStyle = "#fff";
    const fs = Math.max(10, Math.min(18, Math.floor(r * 0.13)));
    ctx.font = `bold ${fs}px DM Sans, sans-serif`;
    ctx.shadowColor = "rgba(0,0,0,0.7)"; ctx.shadowBlur = 3;
    const lbl = participantes[i].length > 14 ? participantes[i].slice(0, 13) + "…" : participantes[i];
    ctx.fillText(lbl, r - 10, fs / 3); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2);
  ctx.fillStyle = "#0d0d0d"; ctx.fill();
  ctx.strokeStyle = "rgba(200,150,0,0.5)"; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(200,150,0,0.4)"; ctx.lineWidth = 4; ctx.stroke();
}

// ── Animación ──
// CLAVE: startAngle siempre es 0 (reset al inicio de cada giro)
// anguloFinal viene de Firebase — mismo valor para todos los clientes
function animarRuleta(num, participantes, anguloFinal, resultado, duracion) {
  if (animFrames[num]) cancelAnimationFrame(animFrames[num]);
  spinning[num] = true;

  // Siempre arrancamos desde 0 para que todos los clientes hagan el mismo recorrido
  const startAngle = 0;
  const totalDelta = anguloFinal; // anguloFinal ya incluye las vueltas

  const startTime = performance.now();
  let lastTickAngle = 0;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duracion, 1);
    const angle = totalDelta * easeOut(progress);

    currentAngles[num] = angle;
    dibujarRuleta(num, participantes, angle);

    const slice = (Math.PI * 2) / participantes.length;
    if (Math.abs(angle - lastTickAngle) >= slice * 0.8) {
      lastTickAngle = angle;
      if (progress < 0.95) playTick();
    }

    if (progress < 1) {
      animFrames[num] = requestAnimationFrame(frame);
    } else {
      currentAngles[num] = anguloFinal;
      dibujarRuleta(num, participantes, anguloFinal);
      spinning[num] = false;
      mostrarResultado(num, resultado);
      playGanador();
    }
  }

  animFrames[num] = requestAnimationFrame(frame);
}

function mostrarResultado(num, resultado) {
  const el = document.getElementById(`resultado-nombre-${num}`);
  if (!el) return;
  el.textContent = resultado;
  el.classList.add("visible");
}
function ocultarResultado(num) {
  const el = document.getElementById(`resultado-nombre-${num}`);
  if (!el) return;
  el.textContent = "";
  el.classList.remove("visible");
}

// ── Actualizar UI de una ruleta ──
function actualizarRuleta(num, data) {
  if (!data || !data.participantes) return;
  ruletaState[num] = data;

  const participantes = data.participantes || [];
  const historial = data.historial || [];
  const terminada = data.eliminarSalidos && participantes.length === 0 && historial.length > 0;

  const nombreEl = document.getElementById(`nombre-${num}`);
  if (nombreEl) nombreEl.textContent = data.nombre || `Ruleta ${num}`;

  const terminadaEl = document.getElementById(`terminada-${num}`);
  if (terminadaEl) terminadaEl.classList.toggle("visible", terminada);

  if (!spinning[num]) {
    dibujarRuleta(num, participantes, currentAngles[num]);
  }

  if (data.ultimoResultado && !spinning[num]) {
    mostrarResultado(num, data.ultimoResultado);
  } else if (!data.ultimoResultado && !spinning[num]) {
    ocultarResultado(num);
  }

  const restantesEl = document.getElementById(`restantes-${num}`);
  const restantesNumEl = document.getElementById(`restantes-num-${num}`);
  if (restantesEl && restantesNumEl) {
    const mostrar = data.eliminarSalidos && !terminada;
    restantesEl.classList.toggle("hidden", !mostrar);
    restantesNumEl.textContent = participantes.length;
  }

  const historialSection = document.getElementById(`historial-section-${num}`);
  const historialList = document.getElementById(`historial-list-${num}`);
  if (historialSection && historialList) {
    const tieneHistorial = historial.length > 0 && data.eliminarSalidos;
    historialSection.classList.toggle("hidden", !tieneHistorial);
    if (tieneHistorial) {
      historialList.innerHTML = historial.map(h =>
        `<span class="rul-historial-chip">${h}</span>`
      ).join("");
    }
  }

  // ── Detectar giro nuevo ──
  const giro = data.giro;
  if (giro && giro.id && giro.id !== giroIds[num] && !spinning[num]) {
    giroIds[num] = giro.id;

    // Solo animar si el giro es reciente (menos de 15s)
    if (Date.now() - giro.timestamp < 15000) {
      // Verificar que venga el anguloFinal de Firebase
      if (typeof giro.anguloFinal === "number") {
        ocultarResultado(num);
        // Reset del ángulo visual a 0 antes de animar
        currentAngles[num] = 0;
        dibujarRuleta(num, participantes, 0);
        animarRuleta(num, participantes, giro.anguloFinal, giro.resultado, giro.duracion || 5000);
      } else {
        // Fallback: mostrar resultado directo si no hay anguloFinal
        mostrarResultado(num, giro.resultado);
      }
    } else {
      // Giro viejo al reconectar: dibujar en la posición final y mostrar resultado
      if (typeof giro.anguloFinal === "number") {
        currentAngles[num] = giro.anguloFinal;
        dibujarRuleta(num, participantes, giro.anguloFinal);
      }
      mostrarResultado(num, giro.resultado);
    }
  }
}

// ── Listeners Firebase ──
function iniciar() {
  onRuletaConfig(config => {
    modo = config.modo || "1";
    const badge = document.getElementById("modo-badge");
    if (badge) badge.textContent = modo === "2" ? "MODO 2 RULETAS" : "MODO 1 RULETA";
    document.getElementById("block-2")?.classList.toggle("hidden", modo !== "2");
    document.getElementById("parejas-section")?.classList.toggle("hidden", modo !== "2");
  });

  onRuletaData(1, data => {
    const waiting = document.getElementById("estado-waiting");
    const stage = document.getElementById("rul-stage");
    if (!data || (!data.participantes?.length && !data.historial?.length)) {
      waiting.classList.remove("hidden");
      stage.classList.add("hidden");
      return;
    }
    waiting.classList.add("hidden");
    stage.classList.remove("hidden");
    actualizarRuleta(1, data);
  });

  onRuletaData(2, data => {
    if (data && data.participantes) actualizarRuleta(2, data);
  });

  onParejas(parejas => {
    const lista = document.getElementById("parejas-list");
    if (!lista) return;
    lista.innerHTML = "";
    parejas.sort((a, b) => a.timestamp - b.timestamp).forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "rul-pareja-item";
      div.innerHTML = `
        <span class="rul-pareja-num">${i + 1}</span>
        <span class="rul-pareja-nombre">${p.r1}</span>
        <span class="rul-pareja-sep">✦</span>
        <span class="rul-pareja-nombre">${p.r2}</span>
      `;
      lista.appendChild(div);
    });
  });
}

iniciar();
</script>
</body>
</html>
