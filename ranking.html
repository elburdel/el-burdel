<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking - El Burdel</title>
  <!-- SEO & Open Graph -->
  <meta name="description" content="El ranking de los mejores jugadores de El Burdel." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="El Burdel" />
  <meta property="og:title" content="Ranking — El Burdel" />
  <meta property="og:description" content="El ranking de los mejores jugadores de El Burdel." />
  <meta property="og:url" content="https://elburdel.github.io/el-burdel/ranking.html" />
  <meta property="og:image" content="https://elburdel.github.io/el-burdel/assets/img/og-cover.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ranking — El Burdel" />
  <meta name="twitter:description" content="El ranking de los mejores jugadores de El Burdel." />
  <meta name="twitter:image" content="https://elburdel.github.io/el-burdel/assets/img/og-cover.jpg" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/landing.css" />
  <style>
    .ranking-page {
      padding-top: 100px;
      min-height: 80vh;
    }
    .ranking-full-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ranking-row-full {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--negro-2);
      border: 1px solid rgba(200,150,0,0.12);
      border-radius: 8px;
      padding: 16px;
    }
  </style>
  <link rel="icon" type="image/png" href="assets/img/logo.png" />
</head>
<body>

  

  <!-- RANKING FULL -->
  <section class="section ranking-page">
    <div class="section-inner">
      <span class="section-label">Todos los jugadores</span>
      <h2 class="section-title">Ranking Completo</h2>
      <div id="ranking-full-container">
        <div class="media-placeholder" style="font-size:12px;color:var(--crema-3); text-align: center;">Cargando ranking...</div>
      </div>
    </div>
  </section>

  <!-- NAV BOTTOM -->
  <footer class="nav-bottom">
    <div class="nav-bottom-inner">
      <div class="nav-bottom-links">
        <a href="index.html" class="nav-bottom-link">Inicio</a>
      </div>
      <p class="nav-bottom-copy">© 2025 El Burdel — Todos los derechos reservados</p>
    </div>
  </footer>

  <script type="module">
    import { onSession, getUserData } from "./js/auth.js";
    import { initNavbar } from "./js/navbar.js";
    import { db } from "./js/firebase-init.js";
    import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    initNavbar();

    // ── Ranking general — suma puntos de todos los juegos ──
    onValue(ref(db, "users"), (snap) => {
      const users = snap.val() || {};
      const container = document.getElementById("ranking-full-container");
      if (!container) return;

      const ranking = Object.entries(users)
        .filter(([, u]) => u.role !== "admin" && u.status === "active")
        .map(([uid, u]) => {
          const wordlePoints   = u.wordleStats?.totalPoints || 0;
          const impostorPoints = u.points || 0;
          const quienSoyPoints = u.quienSoyPoints || 0;
          const tabooPoints    = u.tabooPoints || 0;
          const total = wordlePoints + impostorPoints + quienSoyPoints + tabooPoints;
          return {
            uid,
            nick:     u.nick || "—",
            team:     u.team || null,
            total,
            wordle:   wordlePoints,
            impostor: impostorPoints,
            quienSoy: quienSoyPoints,
            taboo:    tabooPoints,
            played:   u.wordleStats?.played || 0,
          };
        })
        .sort((a, b) => b.total - a.total);

      if (!ranking.length) {
        container.innerHTML = `<div class="media-placeholder" style="text-align:center;">Aún no hay datos de ranking.</div>`;
        return;
      }

      const medals = ["🥇", "🥈", "🥉"];
      const rows = ranking.map((u, i) => {
        const medal    = medals[i] || `${i + 1}.`;
        const fontSize = i === 0 ? "24px" : i === 1 ? "20px" : i === 2 ? "18px" : "15px";
        const breakdown = [
          u.wordle   ? `🔤 ${u.wordle}`   : "",
          u.impostor ? `🕵️ ${u.impostor}` : "",
          u.quienSoy ? `🪪 ${u.quienSoy}` : "",
          u.taboo    ? `🃏 ${u.taboo}`    : "",
        ].filter(Boolean).join("  ·  ");

        return `
          <div class="ranking-row-full" style="font-size:${fontSize};flex-direction:column;align-items:flex-start;gap:4px;">
            <div style="display:flex;align-items:center;width:100%;gap:10px;">
              <span style="min-width:32px;font-size:${fontSize};">${medal}</span>
              <span style="flex:1;font-weight:500;color:var(--crema);">${u.nick}</span>
              <span style="color:var(--dorado);font-family:var(--font-display);font-size:${fontSize};">
                ${u.total} <span style="font-size:0.6em;letter-spacing:1px;opacity:.6;font-family:var(--font-body);">pts</span>
              </span>
            </div>
            ${breakdown ? `<div style="font-size:11px;color:var(--crema-3);letter-spacing:0.5px;padding-left:42px;">${breakdown}</div>` : ""}
          </div>
        `;
      }).join("");

      container.innerHTML = `<div class="ranking-full-list">${rows}</div>`;
    });
  </script>

<script type="module">
  import { initNavbar } from "./js/navbar.js";
  initNavbar();
</script>
</body>
</html>
