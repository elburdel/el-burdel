<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar â€” El Burdel</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="icon" type="image/png" href="assets/img/logo.png" />
</head>
<body>

  

  <!-- CONTENIDO -->
  <main class="login-main">
    <div class="login-card">

      <div class="login-bombitas">
        <span class="bombita"></span><span class="bombita"></span><span class="bombita"></span>
        <span class="bombita"></span><span class="bombita"></span>
      </div>

      <h1 class="login-title">El Burdel</h1>

      <!-- TABS -->
      <div class="login-tabs">
        <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="tab-btn" id="tab-register" onclick="showTab('register')">Registrarse</button>
      </div>

      <!-- FORM LOGIN -->
      <div class="tab-content" id="form-login">
        <div class="form-group">
          <label class="form-label">Correo electrÃ³nico</label>
          <input type="email" id="login-email" class="form-input" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label">ContraseÃ±a</label>
          <input type="password" id="login-pass" class="form-input" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" />
        </div>
        <button class="form-btn" id="btn-login" onclick="handleLogin()">Entrar</button>
        <button class="form-link" onclick="showRecover()">Â¿Olvidaste tu contraseÃ±a?</button>
      </div>

      <!-- FORM REGISTRO -->
      <div class="tab-content hidden" id="form-register">
        <div class="form-group">
          <label class="form-label">Nick <span class="form-hint">(solo letras y nÃºmeros)</span></label>
          <input type="text" id="reg-nick" class="form-input" placeholder="TuNick" maxlength="20"
            oninput="previewNick(this)" />
          <span class="nick-preview" id="nick-preview"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Correo electrÃ³nico</label>
          <input type="email" id="reg-email" class="form-input" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label">ContraseÃ±a <span class="form-hint">(mÃ­nimo 6 caracteres)</span></label>
          <input type="password" id="reg-pass" class="form-input" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" />
        </div>
        <button class="form-btn" id="btn-register" onclick="handleRegister()">Crear cuenta</button>
        <p class="form-note">Tu cuenta quedarÃ¡ pendiente hasta que el admin la apruebe.</p>
      </div>

      <!-- FORM RECUPERAR -->
      <div class="tab-content hidden" id="form-recover">
        <p class="recover-text">IngresÃ¡ tu correo y te mandamos un link para restablecer tu contraseÃ±a.</p>
        <div class="form-group">
          <label class="form-label">Correo electrÃ³nico</label>
          <input type="email" id="recover-email" class="form-input" placeholder="tu@email.com" />
        </div>
        <button class="form-btn" id="btn-recover" onclick="handleRecover()">Enviar link</button>
        <button class="form-link" onclick="showTab('login')">â† Volver al login</button>
      </div>

      <!-- MENSAJE DE ERROR / Ã‰XITO -->
      <div class="form-msg hidden" id="form-msg"></div>

      <div class="login-bombitas bottom">
        <span class="bombita"></span><span class="bombita"></span><span class="bombita"></span>
        <span class="bombita"></span><span class="bombita"></span>
      </div>

    </div>
  </main>

  <!-- NAV BOTTOM -->
  <footer class="nav-bottom">
    <div class="nav-bottom-inner">
      <div class="nav-bottom-links">
        <a href="terminos.html" class="nav-bottom-link">TÃ©rminos</a>
        <a href="privacidad.html" class="nav-bottom-link">Privacidad</a>
      </div>
      <p class="nav-bottom-copy">Â© 2025 El Burdel</p>
    </div>
  </footer>

  <script type="module">
    import { registerUser, loginUser, recoverPassword, onSession, redirectByRole } from "./js/auth.js";

    // Flag para bloquear la redirecciÃ³n automÃ¡tica durante el registro
    let isRegistering = false;

    // Redirigir si ya hay sesiÃ³n activa (solo si no estamos en proceso de registro)
    onSession(async (user) => {
      if (user && !isRegistering) await redirectByRole(user);
    });

    // Exponer funciones al HTML
    window.handleLogin = async () => {
      const email = document.getElementById("login-email").value.trim();
      const pass = document.getElementById("login-pass").value;
      const btn = document.getElementById("btn-login");
      btn.disabled = true;
      btn.textContent = "Entrando...";
      try {
        await loginUser(email, pass);
      } catch (e) {
        showMsg(friendlyError(e.code || e.message), "error");
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    };

    window.handleRegister = async () => {
      const nick = document.getElementById("reg-nick").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const pass = document.getElementById("reg-pass").value;
      const btn = document.getElementById("btn-register");
      btn.disabled = true;
      btn.textContent = "Creando cuenta...";

      // Bloquear onSession mientras completamos el registro en la DB
      isRegistering = true;
      try {
        await registerUser(nick, email, pass);
        showMsg("Â¡Cuenta creada! EsperÃ¡ que el admin te apruebe.", "success");
        btn.textContent = "Â¡Listo!";
        // Una vez guardado todo en la DB, redirigir manualmente a pending
        setTimeout(() => {
          window.location.href = "/el-burdel/pending.html";
        }, 1500);
      } catch (e) {
        isRegistering = false;
        showMsg(friendlyError(e.code || e.message), "error");
        btn.disabled = false;
        btn.textContent = "Crear cuenta";
      }
    };

    window.handleRecover = async () => {
      const email = document.getElementById("recover-email").value.trim();
      const btn = document.getElementById("btn-recover");
      btn.disabled = true;
      btn.textContent = "Enviando...";
      try {
        await recoverPassword(email);
        showMsg("Â¡Listo! RevisÃ¡ tu correo.", "success");
      } catch (e) {
        showMsg(friendlyError(e.code || e.message), "error");
      }
      btn.disabled = false;
      btn.textContent = "Enviar link";
    };

    window.previewNick = (input) => {
      const clean = input.value.replace(/[^a-zA-Z0-9]/g, "");
      const formatted = clean ? clean.charAt(0).toUpperCase() + clean.slice(1).toLowerCase() : "";
      const preview = document.getElementById("nick-preview");
      preview.textContent = formatted ? `â†’ ${formatted}` : "";
      input.value = clean;
    };

    window.showTab = (tab) => {
      ["login", "register", "recover"].forEach(t => {
        document.getElementById(`form-${t}`).classList.add("hidden");
        const btn = document.getElementById(`tab-${t}`);
        if (btn) btn.classList.remove("active");
      });
      document.getElementById(`form-${tab}`).classList.remove("hidden");
      const activeBtn = document.getElementById(`tab-${tab}`);
      if (activeBtn) activeBtn.classList.add("active");
      hideMsg();
    };

    window.showRecover = () => {
      ["login", "register"].forEach(t => {
        document.getElementById(`form-${t}`).classList.add("hidden");
        const btn = document.getElementById(`tab-${t}`);
        if (btn) btn.classList.remove("active");
      });
      document.getElementById("form-recover").classList.remove("hidden");
      hideMsg();
    };

    function showMsg(msg, type) {
      const el = document.getElementById("form-msg");
      el.textContent = msg;
      el.className = `form-msg ${type}`;
    }

    function hideMsg() {
      const el = document.getElementById("form-msg");
      el.className = "form-msg hidden";
    }

    function friendlyError(code) {
      const map = {
        "auth/user-not-found": "No existe una cuenta con ese correo.",
        "auth/wrong-password": "ContraseÃ±a incorrecta.",
        "auth/invalid-email": "El correo no es vÃ¡lido.",
        "auth/email-already-in-use": "Ese correo ya estÃ¡ registrado.",
        "auth/too-many-requests": "Demasiados intentos. EsperÃ¡ un momento.",
        "auth/invalid-credential": "Correo o contraseÃ±a incorrectos.",
      };
      return map[code] || code;
    }
  </script>

<script type="module">
  import { initNavbar } from "./js/navbar.js";
  initNavbar();
</script>
</body>
</html>
